<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Фон -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Зубочистка (логотип) -->
  <line x1="400" y1="400" x2="550" y2="250" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Заголовок -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">Matriarch</text>
  
  <!-- Подзаголовок -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="36" fill="#ffffff" text-anchor="middle" opacity="0.9">Поиск фильмов и сериалов</text>
  
  <!-- Дополнительная информация -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" opacity="0.7">TMDB • Трейлеры • Рейтинги</text>
</svg>
