<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matriarch - Поиск фильмов и сериалов онлайн</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current URL and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new URL with the query string, while preserving the
      // original path and query string.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          return window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }

        if (l.pathname !== '/KIno/' && l.pathname !== '/KIno/index.html') {
          var path = l.pathname + l.search + l.hash;
          var redirect = '/KIno/?p=' + encodeURIComponent(path);
          window.history.replaceState(null, null, redirect);
        }
      }(window.location))
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
    <script>
      // Redirect to main app with the path preserved
      var path = window.location.pathname + window.location.search + window.location.hash;
      if (path !== '/KIno/' && path !== '/KIno/index.html') {
        window.location.href = '/KIno/?p=' + encodeURIComponent(path);
      } else {
        window.location.href = '/KIno/';
      }
    </script>
  </body>
</html>
